<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - PicknCart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand">
                    <a th:href="@{/}">PicknCart</a>
                </div>
                <ul class="nav-menu">
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/categories}">Categories</a></li>
                    <li><a th:href="@{/cart}">Cart</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/orders}">Orders</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/profile}">Profile</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/register}">Register</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="cart-section">
            <h2>Shopping Cart</h2>
            <div th:if="${cartItems != null and !cartItems.isEmpty()}">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td>
                                <span th:text="${item.item.name}">Item Name</span>
                            </td>
                            <td th:text="${'TZS ' + #numbers.formatDecimal(item.item.price, 0, 'COMMA', 2, 'POINT')}">Price</td>
                            <td th:text="${item.quantity}">Quantity</td>
                            <td th:text="${'TZS ' + #numbers.formatDecimal(item.item.price * item.quantity, 0, 'COMMA', 2, 'POINT')}">Total</td>
                            <td>
                                <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post" style="display: inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3"><strong>Total</strong></td>
                            <td colspan="2" th:text="${'TZS ' + #numbers.formatDecimal(total, 0, 'COMMA', 2, 'POINT')}">Total</td>
                        </tr>
                    </tfoot>
                </table>
                <div class="cart-actions">
                    <a th:href="@{/checkout}" class="btn btn-primary">Proceed to Checkout</a>
                    <a th:href="@{/}" class="btn btn-secondary">Continue Shopping</a>
                </div>
            </div>
            <div th:if="${cartItems == null or cartItems.isEmpty()}">
                <p>Your cart is empty.</p>
                <a th:href="@{/}" class="btn btn-primary">Start Shopping</a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PicknCart</p>
        </div>
    </footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
