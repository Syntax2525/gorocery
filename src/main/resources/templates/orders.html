<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - PicknCart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand">
                    <a th:href="@{/}">PicknCart</a>
                </div>
                <ul class="nav-menu">
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/categories}">Categories</a></li>
                    <li><a th:href="@{/cart}">Cart</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/orders}">Orders</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/profile}">Profile</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/register}">Register</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="orders-section">
            <h2>My Orders</h2>
            <div th:if="${orders != null and !orders.isEmpty()}">
                <div class="order-list">
                    <div class="order-card" th:each="order : ${orders}">
                        <div class="order-header">
                            <h3>Order #<span th:text="${order.id}">Order ID</span></h3>
                            <span class="order-status" th:text="${order.status}">Status</span>
                        </div>
                        <div class="order-details">
                            <p><strong>Date:</strong> <span th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'dd MMM yyyy HH:mm') : 'N/A'}">Date</span></p>
                            <p><strong>Total:</strong> <span th:text="${'TZS ' + #numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 2, 'POINT')}">Total</span></p>
                            <div class="order-items" th:if="${order.orderItems != null}">
                                <h4>Items:</h4>
                                <ul>
                                    <li th:each="item : ${order.orderItems}">
                                        <span th:text="${item.item.name}">Item Name</span>
                                        <span th:text="${'Qty: ' + item.quantity}">Quantity</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <div class="order-actions">
                            <form th:action="@{/api/orders/reorder/{id}(id=${order.id})}" method="post" style="display: inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-secondary">Reorder</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${orders == null or orders.isEmpty()}">
                <p>You have no orders yet.</p>
                <a th:href="@{/}" class="btn btn-primary">Start Shopping</a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PicknCart - Dar es Salaam, Tanzania</p>
        </div>
    </footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
