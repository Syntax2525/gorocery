<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PicknCart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand">
                    <a th:href="@{/}">PicknCart</a>
                </div>
                <ul class="nav-menu">
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/categories}">Categories</a></li>
                    <li><a th:href="@{/cart}">Cart</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/orders}">Orders</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/profile}">Profile</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/register}">Register</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <div th:if="${_csrf != null}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            </div>
                            <button type="submit" class="btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="auth-section">
            <div class="auth-card">
                <h2>Login</h2>
                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div th:if="${param.error}" class="alert alert-error">
                        Invalid email or password.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        You have been logged out successfully.
                    </div>
                    <div th:if="${_csrf != null}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>
                <p class="auth-link">
                    Don't have an account? <a th:href="@{/register}">Register here</a>
                </p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 PicknCart</p>
        </div>
    </footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
