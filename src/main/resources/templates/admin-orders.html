<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Orders - PicknCart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <h1>Manage Orders</h1>
    <p><a th:href="@{/admin/dashboard}">Back to Dashboard</a></p>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section class="products">
        <h2>All Orders</h2>
        <div class="product-grid" th:if="${orders != null and !orders.isEmpty()}">
            <div class="product-card" th:each="order : ${orders}">
                <div class="product-info">
                    <h3 th:text="${'Order #' + order.id}">Order</h3>
                    <p th:text="${'User: ' + (order.user != null ? order.user.email : 'N/A')}"></p>
                    <p th:text="${'Total: TZS ' + order.totalAmount}"></p>
                    <p th:text="${'Created: ' + order.createdAt}"></p>
                    <form th:action="@{'/admin/orders/' + ${order.id} + '/status'}" method="post">
                        <select name="status" required>
                            <option value="PLACED" th:selected="${order.status == 'PLACED'}">PLACED</option>
                            <option value="PROCESSING" th:selected="${order.status == 'PROCESSING'}">PROCESSING</option>
                            <option value="SHIPPED" th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
                            <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">DELIVERED</option>
                            <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
                        </select>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-primary" type="submit">Update Status</button>
                    </form>
                </div>
            </div>
        </div>
        <p th:if="${orders == null or orders.isEmpty()}">No orders found.</p>
    </section>
</main>
</body>
</html>
