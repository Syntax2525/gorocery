<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure Checkout | PicknCart Tanzania</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/style/checkout.css"/>
</head>
<body>
<header class="fixed top-0 w-full z-50 bg-white-80 backdrop-blur-md border-b border-outline-variant shadow-0_4px_20px_rgba_0_0_0_0_05">
  <div class="flex justify-between items-center px-4 md-px-8 py-3 max-w-7xl mx-auto">
    <div class="flex items-center gap-4">
      <a class="text-primary transition-colors flex items-center gap-1" href="/cart">
        <span class="material-symbols-outlined">arrow_back</span>
        <span class="font-label-md">Return to Cart</span>
      </a>
    </div>
    <div class="text-2xl font-black text-primary tracking-tight">PicknCart</div>
    <div class="flex items-center gap-4 text-outline">
      <span class="material-symbols-outlined icon-filled">lock</span>
      <span class="hidden md-inline font-label-sm uppercase tracking-wider">Secure SSL Encryption</span>
    </div>
  </div>
</header>
<main class="pt-24 pb-xl px-margin max-w-7xl mx-auto">
  <div class="grid grid-cols-1 lg-grid-cols-12 gap-md items-start">
    <div class="lg-col-span-8 space-y-md">
      <section class="bg-surface-container-lowest rounded-xl shadow-0_4px_20px_rgba_0_0_0_0_05 overflow-hidden">
        <div class="p-md border-b border-outline-variant bg-surface-bright flex items-center justify-between">
          <h2 class="font-h3 text-h3 text-primary">Shipping Information</h2>
          <span class="material-symbols-outlined text-primary">local_shipping</span>
        </div>
        <form th:action="@{/checkout}" method="post" class="p-md grid grid-cols-1 md-grid-cols-2 gap-md">
          <div class="space-y-xs">
            <label class="block font-label-md text-on-surface-variant">Full Name</label>
            <input class="w-full bg-F1F5F9 border-none rounded-lg focus-ring-2 focus-ring-primary p-sm text-body-md" name="fullName" th:value="${user?.getFullName()}" placeholder="e.g. Juma Rashid" type="text" required/>
          </div>
          <div class="space-y-xs">
            <label class="block font-label-md text-on-surface-variant">Phone Number</label>
            <div class="relative">
              <span class="absolute left-sm top-1-2 -translate-y-1-2 text-on-surface-variant">+255</span>
              <input class="w-full bg-F1F5F9 border-none rounded-lg focus-ring-2 focus-ring-primary p-sm pl-16 text-body-md" name="phone" th:value="${user?.phoneNumber}" placeholder="7XX XXX XXX" type="tel" required/>
            </div>
          </div>
          <div class="md-col-span-2 space-y-xs">
            <label class="block font-label-md text-on-surface-variant">Delivery Address</label>
            <input class="w-full bg-F1F5F9 border-none rounded-lg focus-ring-2 focus-ring-primary p-sm text-body-md" name="address" th:value="${user?.street}" placeholder="Apartment, Suite, Unit, Landmark" type="text" required/>
          </div>
          <div class="space-y-xs">
            <label class="block font-label-md text-on-surface-variant">District</label>
            <select class="w-full bg-F1F5F9 border-none rounded-lg focus-ring-2 focus-ring-primary p-sm text-body-md" name="district" required data-district-select>
              <option value="">Select District</option>
              <option value="Kinondoni" th:data-fee="${deliveryFeeOptions['Kinondoni']}" th:selected="${user?.district == 'Kinondoni'}">Kinondoni</option>
              <option value="Ilala" th:data-fee="${deliveryFeeOptions['Ilala']}" th:selected="${user?.district == 'Ilala'}">Ilala</option>
              <option value="Temeke" th:data-fee="${deliveryFeeOptions['Temeke']}" th:selected="${user?.district == 'Temeke'}">Temeke</option>
              <option value="Ubungo" th:data-fee="${deliveryFeeOptions['Ubungo']}" th:selected="${user?.district == 'Ubungo'}">Ubungo</option>
              <option value="Kigamboni" th:data-fee="${deliveryFeeOptions['Kigamboni']}" th:selected="${user?.district == 'Kigamboni'}">Kigamboni</option>
            </select>
          </div>
          <div class="space-y-xs">
            <label class="block font-label-md text-on-surface-variant">Payment Method</label>
            <select class="w-full bg-F1F5F9 border-none rounded-lg focus-ring-2 focus-ring-primary p-sm text-body-md" name="paymentMethod" required>
              <option value="M-PESA">Vodacom M-Pesa</option>
              <option value="TIGO_PESA">Tigo Pesa</option>
              <option value="AIRTEL_MONEY">Airtel Money</option>
              <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
            </select>
          </div>
          <div class="md-col-span-2">
            <button class="w-full py-md bg-secondary text-on-secondary rounded-xl font-h3 flex items-center justify-center gap-base hover-bg-secondary-90 transition-all active-scale-98 shadow-lg" type="submit">
              <span class="material-symbols-outlined icon-filled">lock</span>
              Complete Order
            </button>
          </div>
        </form>
      </section>
    </div>
    <aside class="lg-col-span-4 sticky top-24 space-y-md">
      <section class="bg-surface-container-lowest rounded-xl shadow-0_4px_20px_rgba_0_0_0_0_05 overflow-hidden">
        <div class="p-md border-b border-outline-variant bg-surface-bright">
          <h2 class="font-h3 text-h3 text-primary">Order Summary</h2>
        </div>
        <div class="p-md space-y-md">
          <div class="flex gap-sm" th:each="cartItem : ${cartItems}">
            <div class="w-20 h-20 bg-surface-container-low rounded-lg flex-shrink-0 overflow-hidden border border-outline-variant">
              <img class="w-full h-full object-cover" th:src="${cartItem.item.imageUrl != null ? cartItem.item.imageUrl : 'https://via.placeholder.com/80x80'}" th:alt="${cartItem.item.name}"/>
            </div>
            <div class="flex-1">
              <p class="font-label-md text-on-surface line-clamp-1" th:text="${cartItem.item.name}">Product</p>
              <p class="text-label-sm text-on-surface-variant">Qty: <span th:text="${cartItem.quantity}">1</span></p>
              <p class="font-bold text-primary text-body-md mt-1">TSH <span th:text="${#numbers.formatDecimal(cartItem.item.price * cartItem.quantity, 0, 'COMMA', 0, 'POINT')}">0</span></p>
            </div>
          </div>
          <div class="pt-md border-t border-outline-variant space-y-sm">
            <div class="flex justify-between text-body-md text-on-surface-variant">
              <span>Subtotal</span>
              <span>TSH <span data-subtotal th:data-subtotal="${total}" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}">0</span></span>
            </div>
            <div class="flex justify-between text-body-md text-on-surface-variant">
              <span>Delivery Fee</span>
              <span class="text-primary font-medium">TSH <span data-delivery-fee th:text="${#numbers.formatDecimal(deliveryFee, 0, 'COMMA', 0, 'POINT')}">0</span></span>
            </div>
            <div class="flex justify-between text-h3 font-bold text-on-surface pt-sm">
              <span>Total</span>
              <span class="text-secondary">TSH <span data-grand-total th:text="${#numbers.formatDecimal(grandTotal, 0, 'COMMA', 0, 'POINT')}">0</span></span>
            </div>
          </div>
        </div>
      </section>
    </aside>
  </div>
</main>
<footer class="bg-gray-100 border-t border-outline-variant w-full rounded-t-3xl mt-xl">
  <div class="flex flex-col md-flex-row justify-between items-center px-8 py-12 gap-6 max-w-7xl mx-auto">
    <div class="font-bold text-on-surface-variant font-label-sm uppercase tracking-wider">&copy; 2024 PicknCart Tanzania.</div>
    <div class="flex gap-md">
      <a class="text-gray-500 hover-text-primary transition-colors text-xs uppercase tracking-wider" href="/register">Privacy Policy</a>
      <a class="text-gray-500 hover-text-primary transition-colors text-xs uppercase tracking-wider" href="/orders">Support</a>
    </div>
  </div>
</footer>
<script src="/js/checkout.js"></script>
</body>
</html>
