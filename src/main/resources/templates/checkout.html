<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - PicknCart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand">
                    <a th:href="@{/}">PicknCart</a>
                </div>
                <ul class="nav-menu">
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/categories}">Categories</a></li>
                    <li><a th:href="@{/cart}">Cart</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/orders}">Orders</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/profile}">Profile</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/register}">Register</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="checkout-section">
            <h2>Checkout</h2>
            <div class="checkout-container">
                <div class="checkout-summary">
                    <h3>Order Summary</h3>
                    <div th:if="${cartItems != null and !cartItems.isEmpty()}">
                        <ul class="checkout-items">
                            <li th:each="item : ${cartItems}">
                                <span th:text="${item.item.name}">Item</span>
                                <span th:text="${item.quantity + ' x TZS ' + #numbers.formatDecimal(item.item.price, 0, 'COMMA', 2, 'POINT')}">Qty x Price</span>
                            </li>
                        </ul>
                        <div class="checkout-total">
                            <strong>Total: <span th:text="${'TZS ' + #numbers.formatDecimal(total, 0, 'COMMA', 2, 'POINT')}">Total</span></strong>
                        </div>
                    </div>
                </div>
                <div class="checkout-form">
                    <h3>Delivery Information</h3>
                    <form th:action="@{/checkout}" method="post">
                        <div class="form-group">
                            <label for="address">Delivery Address</label>
                            <textarea id="address" name="address" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="paymentMethod">Payment Method</label>
                            <select id="paymentMethod" name="paymentMethod" required>
                                <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
                                <option value="MOBILE_MONEY">Mobile Money</option>
                            </select>
                        </div>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-primary btn-block">Place Order</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PicknCart</p>
        </div>
    </footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
