<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category - PicknCart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand">
                    <a th:href="@{/}">PicknCart</a>
                </div>
                <ul class="nav-menu">
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/categories}">Categories</a></li>
                    <li><a th:href="@{/cart}">Cart</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/orders}">Orders</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/profile}">Profile</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/register}">Register</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="category-items-section">
            <h2 th:text="${category != null ? category.name : 'Category'}">Category Name</h2>
            <div class="product-grid" th:if="${items != null and !items.isEmpty()}">
                <div class="product-card" th:each="item : ${items}">
                    <img th:src="${item.imageUrl != null ? item.imageUrl : '/images/placeholder.jpg'}" 
                         th:alt="${item.name}" class="product-image">
                    <div class="product-info">
                        <h3 th:text="${item.name}">Product Name</h3>
                        <p class="product-description" th:text="${item.description}">Description</p>
                        <p class="product-price" th:text="${'TZS ' + #numbers.formatDecimal(item.price, 0, 'COMMA', 2, 'POINT')}">Price</p>
                        <div class="product-actions">
                            <form th:action="@{/cart/add}" method="post" style="display: inline;">
                                <input type="hidden" name="itemId" th:value="${item.id}">
                                <input type="hidden" name="quantity" value="1">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-primary">Add to Cart</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <p th:if="${items == null or items.isEmpty()}">No items in this category.</p>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PicknCart</p>
        </div>
    </footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
