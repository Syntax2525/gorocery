<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title th:text="${category?.name} + ' - PicknCart'">Category Items</title>
<link rel="stylesheet" href="/style/category-items.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
</head>
<body>
  <header class="fixed top-0 w-full z-50 bg-white-80 backdrop-blur-md border-b border-gray-200 shadow-[0_4px_20px_rgba(0,0,0,0.05)]">
    <div class="flex justify-between items-center px-4 md-px-8 py-3 max-w-7xl mx-auto">
      <div class="text-2xl font-black text-teal-700 tracking-tight">PicknCart</div>
      <nav class="hidden md:flex items-center space-x-8">
        <a class="text-gray-600 hover:text-teal-600 transition-colors" href="/">Home</a>
        <a class="text-gray-600 hover:text-teal-600 transition-colors" href="/categories">Categories</a>
        <a class="text-teal-700 font-bold border-b-2 border-orange-500" th:href="@{/category/{id}(id=${category.id})}" th:text="${category.name}">Category</a>
      </nav>
      <div class="flex items-center gap-4">
        <div class="flex gap-3 text-teal-700">
          <a class="icon-link" href="/cart"><span class="material-symbols-outlined">shopping_cart</span></a>
          <a class="icon-link" href="/orders"><span class="material-symbols-outlined">notifications</span></a>
          <a class="icon-link" href="/profile"><span class="material-symbols-outlined">person</span></a>
        </div>
      </div>
    </div>
  </header>

  <main class="pt-24 pb-16 px-margin max-w-7xl mx-auto">
    <section class="mb-lg">
      <h1 class="font-h1 text-h1 text-on-background mb-sm" th:text="${category.name}">Category</h1>
      <p class="text-on-surface-variant" th:text="${category.description}">Description</p>
    </section>

    <section class="grid grid-cols-2 md-grid-cols-3 lg-grid-cols-4 gap-md">
      <div class="item-card" th:each="item : ${items}">
        <img class="item-img" th:src="${item.imageUrl != null ? item.imageUrl : 'https://via.placeholder.com/300x200'}" th:alt="${item.name}"/>
        <div class="item-info">
          <h3 class="item-title" th:text="${item.name}">Product</h3>
          <p class="item-price">TSh <span th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}">0</span></p>
          <p class="item-stock" th:text="${item.stock > 0 ? item.stock + ' in stock' : 'Out of stock'}">Stock</p>
          <form th:action="@{/cart/add}" method="post">
            <input type="hidden" name="itemId" th:value="${item.id}"/>
            <input type="hidden" name="quantity" value="1"/>
            <button class="add-btn" type="submit" th:disabled="${item.stock <= 0}" th:text="${item.stock > 0 ? 'Add to Cart' : 'Out of Stock'}">Add to Cart</button>
          </form>
        </div>
      </div>
      <div th:if="${#lists.isEmpty(items)}" class="col-span-full text-center py-20 text-gray-500">
        <span class="material-symbols-outlined empty-state-icon">inventory_2</span>
        <p class="mt-4">No items in this category yet</p>
        <a class="empty-state-link" href="/categories">Browse other categories</a>
      </div>
    </section>
  </main>

  <footer class="bg-gray-100 w-full rounded-t-3xl border-t border-gray-200">
    <div class="flex flex-col md-flex-row justify-between items-center px-8 py-12 gap-6 max-w-7xl mx-auto">
      <div class="font-bold text-gray-900 text-lg">PicknCart</div>
      <div class="flex gap-8">
        <a class="text-gray-500 hover:text-teal-600 transition-colors" href="/">Home</a>
        <a class="text-gray-500 hover:text-teal-600 transition-colors" href="/categories">Categories</a>
      </div>
    </div>
  </footer>
</body>
</html>
