<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Server Error | PicknCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9fafb; margin: 0; padding: 0; }
        .error-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .error-icon { font-size: 80px; color: #ef4444; margin-bottom: 1rem; }
        .error-code { font-size: 6rem; font-weight: 900; color: #111827; margin: 0; line-height: 1; }
        .error-title { font-size: 1.5rem; font-weight: 700; color: #374151; margin: 1rem 0 0.5rem; }
        .error-message { font-size: 1.125rem; color: #6b7280; margin-bottom: 2rem; max-width: 500px; }
        .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: #0d9488; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: all 0.2s; }
        .btn-primary:hover { background: #0f766e; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="error-container">
        <span class="material-symbols-outlined error-icon">dangerous</span>
        <h1 class="error-code">500</h1>
        <h2 class="error-title">Internal Server Error</h2>
        <p class="error-message">Something went wrong on our end. Please try again later, or contact support if the problem persists.</p>
        <div style="display: flex; gap: 12px;">
            <a href="javascript:history.back()" class="btn-primary">
                <span class="material-symbols-outlined" style="font-size: 20px;">arrow_back</span>
                Go Back
            </a>
            <a href="/" class="btn-primary">
                <span class="material-symbols-outlined" style="font-size: 20px;">home</span>
                Home
            </a>
        </div>
    </div>
</body>
</html>
