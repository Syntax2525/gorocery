<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Categories - PicknCart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <h1>Manage Categories</h1>
    <p><a th:href="@{/admin/dashboard}">Back to Dashboard</a></p>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section class="auth-card">
        <h2>Create Category</h2>
        <form th:action="@{/admin/categories}" method="post">
            <input type="text" name="name" placeholder="Category name" required>
            <input type="text" name="description" placeholder="Description">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-primary" type="submit">Create</button>
        </form>
    </section>

    <section class="products">
        <h2>Existing Categories</h2>
        <div class="product-grid" th:if="${categories != null and !categories.isEmpty()}">
            <div class="product-card" th:each="category : ${categories}">
                <div class="product-info">
                    <form th:action="@{'/admin/categories/' + ${category.id} + '/update'}" method="post">
                        <input type="text" name="name" th:value="${category.name}" required>
                        <input type="text" name="description" th:value="${category.description}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-primary" type="submit">Update</button>
                    </form>
                    <form th:action="@{'/admin/categories/' + ${category.id} + '/delete'}" method="post" style="margin-top:10px;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn" type="submit">Delete</button>
                    </form>
                </div>
            </div>
        </div>
        <p th:if="${categories == null or categories.isEmpty()}">No categories found.</p>
    </section>
</main>
</body>
</html>
