<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - PicknCart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="nav-brand">
                    <a th:href="@{/}">PicknCart</a>
                </div>
                <ul class="nav-menu">
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/categories}">Categories</a></li>
                    <li><a th:href="@{/cart}">Cart</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/orders}">Orders</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/profile}">Profile</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/register}">Register</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="categories-section">
            <h2>Product Categories</h2>
            <div class="category-grid" th:if="${categories != null and !categories.isEmpty()}">
                <div class="category-card" th:each="category : ${categories}">
                    <a th:href="@{/category/{id}(id=${category.id})}">
                        <h3 th:text="${category.name}">Category Name</h3>
                        <p th:text="${category.description}" th:if="${category.description != null}">Description</p>
                    </a>
                </div>
            </div>
            <p th:if="${categories == null or categories.isEmpty()}">No categories available.</p>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PicknCart - Dar es Salaam, Tanzania</p>
        </div>
    </footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
