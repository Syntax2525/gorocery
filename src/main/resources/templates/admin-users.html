<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users - PicknCart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <h1>Manage Users</h1>
    <p><a th:href="@{/admin/dashboard}">Back to Dashboard</a></p>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section class="products">
        <h2>All Users</h2>
        <div class="product-grid" th:if="${users != null and !users.isEmpty()}">
            <div class="product-card" th:each="u : ${users}">
                <div class="product-info">
                    <h3 th:text="${u.firstName + ' ' + u.lastName}">Name</h3>
                    <p th:text="${u.email}">email</p>
                    <p th:text="${'Current Role: ' + u.role}"></p>
                    <form th:action="@{'/admin/users/' + ${u.id} + '/role'}" method="post">
                        <select name="role" required>
                            <option value="CUSTOMER" th:selected="${u.role == 'CUSTOMER'}">CUSTOMER</option>
                            <option value="ADMIN" th:selected="${u.role == 'ADMIN'}">ADMIN</option>
                        </select>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-primary" type="submit">Update Role</button>
                    </form>
                </div>
            </div>
        </div>
        <p th:if="${users == null or users.isEmpty()}">No users found.</p>
    </section>
</main>
</body>
</html>
